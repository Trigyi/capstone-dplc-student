image:
  repository: trigyi/worldcup2026-app
  tag: v1.1
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  app:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  postgres:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 200Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercent: 70

probes:
  liveness:
    path: /api/health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    # /api/compute blocks Node's single event loop for 2-3s; tolerate a few
    # consecutive misses under CPU load before deciding the pod is truly stuck.
    failureThreshold: 6
  readiness:
    path: /api/health/db
    initialDelaySeconds: 0
    periodSeconds: 1
    timeoutSeconds: 2
    failureThreshold: 3

service:
  port: 3000

ingress:
  enabled: true
  className: traefik
  # IP publique du VPS Ikoula, exposée via sslip.io (résolution DNS sans nom de domaine à acheter)
  host: worldcup.178.170.25.135.sslip.io

postgres:
  image: postgres:15
  database: worldcup2026
  user: postgres
  storageSize: 1Gi

env:
  DB_HOST: "{{ .Release.Name }}-postgres"
  DB_PORT: "5432"
  DB_NAME: worldcup2026
  DB_USER: postgres
