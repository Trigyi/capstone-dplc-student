{{- $secretName := printf "%s-secret" (include "worldcup2026-app.postgresFullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if $existing }}
{{- $password = index $existing.data "POSTGRES_PASSWORD" }}
{{- else }}
{{- $password = randAlphaNum 24 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "worldcup2026-app.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ $password }}
